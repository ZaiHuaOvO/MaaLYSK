name: Sync Release to BaiduPan

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (leave empty for latest)"
        required: false
  release:
    types: [published]

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Get Release Info and Generate Folder Name
        id: release
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG=$(curl -s "https://api.github.com/repos/Witty36/MaaLYSK/releases/latest" | jq -r '.tag_name')
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
          RELEASE_URL="https://api.github.com/repos/Witty36/MaaLYSK/releases/tags/$TAG"
          RELEASE_DATA=$(curl -s -H "Accept: application/vnd.github.v3+json" "$RELEASE_URL")
          
          PUBLISHED_AT=$(echo "$RELEASE_DATA" | jq -r '.published_at')
          if [ "$PUBLISHED_AT" = "null" ] || [ -z "$PUBLISHED_AT" ]; then
            PUBLISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi
          
          YEAR=$(echo "$PUBLISHED_AT" | cut -d'-' -f1)
          MONTH=$(echo "$PUBLISHED_AT" | cut -d'-' -f2 | sed 's/^0//')
          DAY=$(echo "$PUBLISHED_AT" | cut -d'-' -f3 | cut -d'T' -f1 | sed 's/^0//')
          VERSION=$(echo "$TAG" | sed 's/^v//')
          
          FOLDER_NAME="${VERSION} (${YEAR}-${MONTH}-${DAY})"
          echo "folder_name=$FOLDER_NAME" >> $GITHUB_OUTPUT
          TARGET_PATH="/$FOLDER_NAME"
          echo "target_path=$TARGET_PATH" >> $GITHUB_OUTPUT
          
          echo "Release: $TAG"
          echo "Published: $PUBLISHED_AT"
          echo "Target folder: $FOLDER_NAME"
          
          echo "$RELEASE_DATA" | jq -r '.assets[] | "\(.browser_download_url)|\(.name)"' | \
            grep -E "(macos-aarch64|macos-x86_64|win-aarch64|win-x86_64)" | \
            grep -v "linux" > assets.txt
          
          echo "Filtered assets:"
          cat assets.txt

      - name: Upload to BaiduPan
        env:
          CLIENT_ID: ${{ secrets.BAIDU_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.BAIDU_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.BAIDU_REFRESH_TOKEN }}
          TARGET_PATH: ${{ steps.release.outputs.target_path }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          APP_NAME: "MaaLYSK"
          MIRROR: "https://ghproxy.com/"
        run: |
          pip install requests
          
          python3 << 'EOF'
          import os, sys, requests, time, subprocess, hashlib, json
          
          CLIENT_ID = os.environ.get('CLIENT_ID')
          CLIENT_SECRET = os.environ.get('CLIENT_SECRET')
          OLD_REFRESH_TOKEN = os.environ.get('REFRESH_TOKEN')
          TARGET_PATH = os.environ.get('TARGET_PATH', '/Releases')
          GH_TOKEN = os.environ.get('GH_TOKEN')
          REPO = os.environ.get('REPO')
          APP_NAME = os.environ.get('APP_NAME', 'MaaLYSK')
          MIRROR = os.environ.get('MIRROR', '')
          
          FULL_PATH = f"/apps/{APP_NAME}{TARGET_PATH}"
          
          if not all([CLIENT_ID, CLIENT_SECRET, OLD_REFRESH_TOKEN]):
              print("❌ Missing credentials")
              sys.exit(1)
          
          print(f"=== MaaLYSK Sync to BaiduPan ===")
          print(f"Target: {FULL_PATH}")
          print(f"Mirror: {MIRROR if MIRROR else 'Direct (no mirror)'}\n")
          
          def refresh_token():
              url = "https://openapi.baidu.com/oauth/2.0/token"
              params = {
                  'grant_type': 'refresh_token',
                  'refresh_token': OLD_REFRESH_TOKEN,
                  'client_id': CLIENT_ID,
                  'client_secret': CLIENT_SECRET
              }
              resp = requests.get(url, params=params, timeout=30)
              data = resp.json()
              if 'access_token' not in data:
                  print(f"✗ Refresh failed: {data}")
                  sys.exit(1)
              new_refresh = data.get('refresh_token', OLD_REFRESH_TOKEN)
              return data['access_token'], new_refresh
          
          def update_github_secret(name, value):
              if not GH_TOKEN:
                  return False
              cmd = f'echo "{value}" | gh secret set {name} --repo {REPO}'
              result = subprocess.run(cmd, shell=True, capture_output=True, text=True)
              return result.returncode == 0
          
          def get_mirror_url(original_url):
              if not MIRROR:
                  return original_url
              if original_url.startswith('https://github.com'):
                  return MIRROR + original_url
              return original_url
          
          def upload_with_retry(token, file_url, filename, max_retries=3):
              full_path = f"{FULL_PATH.rstrip('/')}/{filename}"
              print(f"\n📦 {filename}")
              
              download_url = get_mirror_url(file_url)
              if download_url != file_url:
                  print(f"  🔗 Mirror: {download_url[:80]}...")
              
              for attempt in range(max_retries):
                  try:
                      if attempt > 0:
                          print(f"  🔄 Retry {attempt + 1}/{max_retries}...")
                          time.sleep(5)
                      
                      print("  ⬇️  Downloading...")
                      r = requests.get(download_url, timeout=600, stream=True)
                      r.raise_for_status()
                      content = r.content
                      size_mb = len(content) / 1024 / 1024
                      print(f"  📊 {size_mb:.2f} MB")
                      
                      chunk_size = 8 * 1024 * 1024
                      chunks = [content[i:i+chunk_size] for i in range(0, len(content), chunk_size)]
                      block_list = [hashlib.md5(chunk).hexdigest() for chunk in chunks]
                      
                      print("  📝 Precreating...")
                      params = {
                          'method': 'precreate',
                          'access_token': token,
                          'path': full_path,
                          'size': len(content),
                          'isdir': '0',
                          'autoinit': '1',
                          'block_list': json.dumps(block_list)
                      }
                      resp = requests.post("https://pan.baidu.com/rest/2.0/xpan/file", params=params, timeout=60)
                      result = resp.json()
                      
                      if result.get('errno') != 0:
                          print(f"  ❌ Precreate failed: {result}")
                          continue
                      
                      upload_id = result.get('uploadid')
                      print(f"  ✓ Upload ID: {upload_id[:30]}...")
                      
                      print("  ⬆️  Uploading chunks...")
                      for i, chunk in enumerate(chunks):
                          params = {
                              'method': 'upload',
                              'access_token': token,
                              'path': full_path,
                              'uploadid': upload_id,
                              'partseq': i,
                              'type': 'tmpfile'
                          }
                          files = {'file': (f"{filename}.part{i}", chunk)}
                          resp = requests.post("https://pan.baidu.com/rest/2.0/xpan/file", params=params, files=files, timeout=120)
                          result = resp.json()
                          if result.get('errno') != 0:
                              print(f"  ❌ Chunk {i} failed: {result}")
                              raise Exception(f"Chunk {i} upload failed")
                      
                      print("  📝 Creating file...")
                      params = {
                          'method': 'create',
                          'access_token': token,
                          'path': full_path,
                          'size': len(content),
                          'isdir': '0',
                          'uploadid': upload_id,
                          'block_list': json.dumps(block_list)
                      }
                      resp = requests.post("https://pan.baidu.com/rest/2.0/xpan/file", params=params, timeout=60)
                      result = resp.json()
                      
                      if result.get('errno') == 0:
                          print("  ✅ Done")
                          return True
                      elif result.get('errno') == -9:
                          print("  ⚠️  Already exists")
                          return True
                      else:
                          print(f"  ❌ Create failed: {result}")
                          continue
                          
                  except Exception as e:
                      print(f"  ❌ Error: {e}")
                      continue
              
              return False
          
          access_token, new_refresh_token = refresh_token()
          
          if new_refresh_token != OLD_REFRESH_TOKEN and GH_TOKEN:
              if update_github_secret('BAIDU_REFRESH_TOKEN', new_refresh_token):
                  print("✓ Refresh token auto-updated\n")
          
          with open('assets.txt') as f:
              assets = [line.strip().split('|') for line in f if line.strip()]
          
          if not assets:
              print("No assets to upload")
              sys.exit(0)
          
          print(f"\nFound {len(assets)} file(s)")
          for url, name in assets:
              print(f"  - {name}")
          
          success = 0
          for url, name in assets:
              if upload_with_retry(access_token, url, name):
                  success += 1
              time.sleep(3)
          
          print(f"\n=== Summary: {success}/{len(assets)} ===")
          if success < len(assets):
              sys.exit(1)
          EOF

      - name: Output Result
        if: always()
        run: |
          echo "=== Upload Complete ==="
          echo "Location: /apps/MaaLYSK${{ steps.release.outputs.target_path }}"
          echo ""
          echo "Uploaded files:"
          cat assets.txt
