[remote.github]
owner = "Witty36"
repo = "MaaLYSK"
#自用时换成自己的仓库owner和repo
#注意，本地git user需与github一致才能实现成功@
[changelog]
header = ""

body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% macro print_commit(commit) -%}
{% set msg = commit.message | split(pat="\n") | first -%}
{% set group_name = commit.group | split(pat="-->") | last | trim -%}
{# 映射 group 到前缀 #}
{% if group_name == "✨ 新功能" -%}
{% set prefix = "Feat" -%}
{% elif group_name == "🐛 Bug修复" -%}
{% set prefix = "Fix" -%}
{% elif group_name == "🚀 性能优化" -%}
{% set prefix = "Perf" -%}
{% elif group_name == "🚜 代码重构" -%}
{% set prefix = "Refactor" -%}
{% elif group_name == "⚙️ 持续集成" -%}
{% set prefix = "Ci" -%}
{% elif group_name == "🔧 日常维护" or group_name == "📦 依赖更新" -%}
{% set prefix = "Chore" -%}
{% else -%}
{% set prefix = "" -%}
{% endif -%}
{# 文档类型不在这里输出，后面单独处理 #}
{% if group_name != "📚 文档" -%}
- {{ prefix }}：{{ msg }} @{{ commit.author.name }}
{% endif -%}
{%- endmacro -%}
{% if version -%}
## {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else -%}
## 未发布
{% endif -%}
## Commit
{%- for group, commits in commits | group_by(attribute="group") -%}
{% set group_name = group | split(pat="-->") | last | trim -%}
{% if group_name != "📚 文档" -%}
{% for commit in commits | filter(attribute="scope") | sort(attribute="scope") -%}
{{- self::print_commit(commit=commit) -}}
{%- endfor -%}
{% for commit in commits -%}
{% if not commit.scope -%}
{{- self::print_commit(commit=commit) -}}
{% endif -%}
{% endfor -%}
{% endif -%}
{% endfor -%}
{#- 单独输出文档 -#}
{% for group, commits in commits | group_by(attribute="group") -%}
{% set group_name = group | split(pat="-->") | last | trim -%}
{% if group_name == "📚 文档" -%}
{% if commits | length > 0 -%}
### Doc
{% endif -%}
{% for commit in commits -%}
{% set msg = commit.message | split(pat="\n") | first -%}
- {{ msg }} @{{ commit.author.name }}
{% endfor -%}
{% endif -%}
{% endfor -%}

{%- if github -%}
{% if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 -%}
## 新贡献者 ❤️
{% endif -%}\
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) -%}
* @{{ contributor.username }} made their first contribution
    {%- if contributor.pr_number %} in \
      [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}) \
    {%- endif %}
{%- endfor -%}
{%- endif %}
"""

# 尾部
footer = """
"""

[git]
# 启用完整的 commit 信息
conventional_commits = true
filter_unconventional = false
split_commits = false
# 保留完整的 commit body
protect_breaking_commits = false
commit_parsers = [
    { message = "(?i)^feat", group = "<!-- 0 -->✨ 新功能" },
    { message = "(?i)^fix", group = "<!-- 1 -->🐛 Bug修复" },
    { message = "(?i)^docs", group = "<!-- 4 -->📚 文档" },
    { message = "(?i)^perf", group = "<!-- 3 -->🚀 性能优化" },
    { message = "(?i)^refactor", group = "<!-- 2 -->🚜 代码重构" },
    { message = "(?i)^style", group = "<!-- 5 -->🎨 样式" },
    { message = "(?i)^test", group = "<!-- 6 -->🧪 测试" },
    { message = "(?i)^chore\\(deps\\)", group = "📦 依赖更新" },
    { message = "(?i)^chore", group = "<!-- 8 -->🔧 日常维护" },
    { message = "(?i)^ci", group = "<!-- 7 -->⚙️ 持续集成" },
    { body = "(?i).*security", group = "<!-- 9 -->🔒 安全" },
    { message = "(?i)^revert", group = "<!-- 10 -->◀️ 撤销" },
]

# 忽略这些提交
ignore_tags = "rc"

# 排序规则
sort_commits = "oldest"

# 启用GitHub集成
[git.github]
commits = true